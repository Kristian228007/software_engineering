version: "3.8"

services:
    postgres:
        image: postgres:15
        container_name: recipe_postgres
        environment:
            POSTGRES_USER: recipe_user
            POSTGRES_PASSWORD: recipe_pass
            POSTGRES_DB: recipe_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
            - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
        networks:
            - recipe_network

    redis:
        image: redis:7
        container_name: recipe_redis
        ports:
            - "6379:6379"
        networks:
            - recipe_network

    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: recipe_zookeeper
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"
        networks:
            - recipe_network

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: recipe_kafka
        depends_on:
            - zookeeper
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
            - "9092:9092"
        networks:
            - recipe_network

    app:
        build:
            context: .
            dockerfile: Dockerfile.api
        container_name: recipe_app
        ports:
            - "8080:8080"
        depends_on:
            - postgres
            - redis
            - kafka
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: recipe_user
            DB_PASSWORD: recipe_pass
            DB_NAME: recipe_db
            REDIS_HOST: redis
            REDIS_PORT: 6379
            KAFKA_BROKERS: kafka:9092
        networks:
            - recipe_network
        volumes:
            - ./swagger.yaml:/app/swagger.yaml

    consumer:
        build:
            context: .
            dockerfile: Dockerfile.consumer
        container_name: recipe_consumer
        depends_on:
            - postgres
            - kafka
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: recipe_user
            DB_PASSWORD: recipe_pass
            DB_NAME: recipe_db
            KAFKA_BROKERS: kafka:9092
        networks:
            - recipe_network

networks:
    recipe_network:
        driver: bridge

volumes:
    postgres_data:
